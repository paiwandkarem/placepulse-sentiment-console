name: CI

# Quality gate that runs before Vercel deploys. Vercel's Git integration owns the deployment itself
# (a preview URL per branch/PR, production promotion on merge to main); this workflow is the test
# gate in front of it: typecheck, lint and a production build on every PR and push to the main
# branches. Evals are NOT here — they make paid model calls, so they run on demand (see evals.yml-
# style manual job below) rather than on every commit, matching the `ci` vs `ci:full` npm split.

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]
  # Manual trigger for the paid eval suite (the verify job still runs on every PR/push).
  workflow_dispatch:

# A newer push to the same branch/PR cancels the in-flight run — no wasted CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Mirrors the local `npm run ci` gate: tsc --noEmit, eslint, then next build.
      - run: npm run ci

  # Optional, on-demand only: runs the live eval suite (real model calls via the AI Gateway), so it is
  # gated behind a manual trigger and a secret rather than firing on every commit. This is the cost
  # decision made explicit — the grounding gate exists, but it is not paid for on every push.
  evals:
    name: evals (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run evals
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
